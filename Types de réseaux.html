<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Types de réseaux</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
</head>
<body>
    <h2 class="titre_principal">Types de réseaux</h2>
    <table>
        <thead>
            <tr>
                <th>Type</th>
                <th>Nom</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>LAN</td>
                <td>Local Area Network</td>
                <td>Réseau local (école, maison)</td>
            </tr>
            <tr>
                <td>MAN</td>
                <td>Metropolitan Area Network</td>
                <td>Réseau d’une ville</td>
            </tr>
            <tr>
                <td>WAN</td>
                <td>Wide Area Network</td>
                <td>Réseau étendu (Internet)</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
